appId: com.partengine.desktop
productName: PartEngine
copyright: PartEngine
# Pinned so electron-builder doesn't need to locate the `electron` module — with
# node-linker=hoisted it lives in the root node_modules, not apps/desktop's, and
# electron-builder (run from apps/desktop) can't compute the version from it.
# With this set, electron-builder fetches the matching Electron binaries itself.
electronVersion: 33.4.11

directories:
  output: release
  buildResources: static

# Disable asar packing. embedded-postgres spawns native binaries (initdb/pg_ctl/
# postgres) using paths relative to its own module location; inside an asar those
# resolve to a virtual path that child_process can't execute (ENOENT), and
# asarUnpack alone doesn't make the library use the .unpacked path. Shipping
# everything as real files on disk makes native-binary spawning just work.
asar: false

# The Electron main bundle (dist/), assets, AND the runtime node_modules — the
# main process requires electron-updater + embedded-postgres at launch, so they
# MUST be packaged.
files:
  - dist/**/*
  - static/**/*
  - package.json
  - node_modules/**/*

# Server bundles are staged by scripts/prepare-bundles.mjs into ./staging and
# shipped as resources (not packed into the asar), so child Node processes can
# execute them directly.
extraResources:
  - from: staging/api
    to: app.api
  - from: staging/web
    to: app.web

# electron-updater reads this to find updates (and the build emits latest.yml).
publish:
  provider: github
  owner: v3ct0r-ez
  repo: PartEngine

win:
  icon: static/icon.ico
  target:
    - target: nsis # installer — installs once to disk; fast subsequent launches
      arch: [x64]
    - target: portable # single self-extracting .exe; convenient but slower to start
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: true
  installerIcon: static/icon.ico
  uninstallerIcon: static/icon.ico
  # Distinct names so installer and portable don't overwrite each other (both .exe).
  artifactName: PartEngine-Setup-${version}.${ext}

portable:
  artifactName: PartEngine-Portable-${version}.${ext}
  # Extract to a FIXED dir and reuse it, so only the FIRST launch is slow
  # (default portable re-extracts ~200MB to a random temp dir every launch).
  unpackDirName: PartEngine

# The app data (Postgres cluster, logs) lives in %APPDATA%/PartEngine and is
# intentionally NOT bundled, so updates never destroy the user's inventory data.
