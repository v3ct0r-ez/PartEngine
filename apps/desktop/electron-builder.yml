appId: com.partengine.desktop
productName: PartEngine
copyright: PartEngine

directories:
  output: release
  buildResources: static

# Disable asar packing. embedded-postgres spawns native binaries (initdb/pg_ctl/
# postgres) using paths relative to its own module location; inside an asar those
# resolve to a virtual path that child_process can't execute (ENOENT), and
# asarUnpack alone doesn't make the library use the .unpacked path. Shipping
# everything as real files on disk makes native-binary spawning just work.
asar: false

# The Electron main bundle (dist/), assets, AND the runtime node_modules — the
# main process requires electron-updater + embedded-postgres at launch, so they
# MUST be packaged.
files:
  - dist/**/*
  - static/**/*
  - package.json
  - node_modules/**/*

# Server bundles are staged by scripts/prepare-bundles.mjs into ./staging and
# shipped as resources (not packed into the asar), so child Node processes can
# execute them directly.
extraResources:
  - from: staging/api
    to: app.api
  - from: staging/web
    to: app.web

# electron-updater reads this to find updates (and the build emits latest.yml).
publish:
  provider: github
  owner: v3ct0r-ez
  repo: PartEngine

win:
  target:
    - target: nsis        # installer
      arch: [x64]
    - target: portable    # single .exe, no install
      arch: [x64]
  artifactName: "PartEngine-${version}-${arch}.${ext}"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

# The app data (Postgres cluster, logs) lives in %APPDATA%/PartEngine and is
# intentionally NOT bundled, so updates never destroy the user's inventory data.
