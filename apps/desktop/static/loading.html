<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <style>
      html, body { margin: 0; height: 100%; font-family: Segoe UI, system-ui, sans-serif; }
      body {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #0f172a; color: #e2e8f0; gap: 1rem; user-select: none;
      }
      .logo { font-size: 1.6rem; font-weight: 700; letter-spacing: 0.5px; }
      .sub { color: #94a3b8; font-size: 0.85rem; }
      .bar { width: 220px; height: 4px; background: #1e293b; border-radius: 4px; overflow: hidden; }
      .bar > div {
        width: 40%; height: 100%; background: #3b82f6; border-radius: 4px;
        animation: slide 1.1s infinite ease-in-out;
      }
      @keyframes slide { 0% { margin-left: -40%; } 100% { margin-left: 100%; } }
    </style>
  </head>
  <body>
    <div class="logo">PartEngine</div>
    <div class="sub">Avvio del database e dei servizi locali…</div>
    <div class="bar"><div></div></div>
  </body>
</html>
