<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <style>
      html, body { margin: 0; height: 100%; font-family: Segoe UI, system-ui, sans-serif; }
      body {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #0f172a; color: #e2e8f0; user-select: none; padding: 28px;
      }
      .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.5px; }
      .sub { color: #94a3b8; font-size: 0.82rem; margin-top: 4px; margin-bottom: 18px; }
      ul#steps { list-style: none; margin: 0; padding: 0; width: 100%; max-width: 380px; }
      ul#steps li {
        display: flex; align-items: center; gap: 10px; padding: 6px 0;
        font-size: 0.9rem; color: #64748b;
      }
      li.active { color: #e2e8f0; }
      li.done { color: #34d399; }
      li.error { color: #f87171; }
      .ico { width: 18px; height: 18px; flex: 0 0 18px; display: inline-flex; align-items: center; justify-content: center; }
      .spinner { width: 14px; height: 14px; border: 2px solid #334155; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .footer { color: #475569; font-size: 0.72rem; margin-top: 20px; }
    </style>
  </head>
  <body>
    <div class="logo">PartEngine</div>
    <div class="sub">Prima configurazione in corso… potrebbe richiedere qualche minuto.</div>
    <ul id="steps"></ul>
    <div class="footer">Non chiudere la finestra.</div>

    <script>
      const list = document.getElementById('steps');
      const items = new Map(); // label -> <li>

      function setStep({ label, state }) {
        let li = items.get(label);
        if (!li) {
          li = document.createElement('li');
          li.innerHTML = '<span class="ico"></span><span class="txt"></span>';
          li.querySelector('.txt').textContent = label;
          list.appendChild(li);
          items.set(label, li);
        }
        li.className = state;
        const ico = li.querySelector('.ico');
        ico.innerHTML =
          state === 'done' ? '✓' : state === 'error' ? '✕' : '<span class="spinner"></span>';
      }

      if (window.peLoading) window.peLoading.onStatus(setStep);
    </script>
  </body>
</html>
