<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; font-family: Segoe UI, system-ui, sans-serif; }
      body {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #0f172a; color: #e2e8f0; user-select: none; padding: 32px 28px;
      }
      .brand-img { height: 130px; width: auto; max-width: 85%; object-fit: contain; margin-bottom: 12px; }
      .logo { font-size: 1.6rem; font-weight: 700; letter-spacing: 0.5px; }
      .sub { color: #94a3b8; font-size: 0.85rem; margin-top: 6px; margin-bottom: 22px; text-align: center; }
      ul#steps {
        list-style: none; margin: 0; padding: 0; width: 100%; max-width: 460px;
        display: flex; flex-direction: column; gap: 4px;
      }
      ul#steps li {
        display: flex; align-items: flex-start; gap: 10px; padding: 7px 10px;
        font-size: 0.92rem; line-height: 1.3; color: #64748b; border-radius: 8px;
      }
      li.active { color: #e2e8f0; background: rgba(59, 130, 246, 0.10); }
      li.done { color: #34d399; }
      li.error { color: #f87171; background: rgba(248, 113, 113, 0.10); }
      .ico { width: 18px; height: 18px; flex: 0 0 18px; margin-top: 1px; display: inline-flex; align-items: center; justify-content: center; font-size: 0.95rem; }
      .txt { flex: 1; word-break: break-word; }
      .spinner { width: 14px; height: 14px; border: 2px solid #334155; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .footer { color: #475569; font-size: 0.74rem; margin-top: 24px; text-align: center; }
    </style>
  </head>
  <body>
    <img class="brand-img" src="logo-splash.png" alt="PartEngine" />
    <div class="logo">PartEngine</div>
    <div class="sub">Prima configurazione in corso… potrebbe richiedere qualche minuto.</div>
    <ul id="steps"></ul>
    <div class="footer">Non chiudere la finestra.</div>

    <script>
      const list = document.getElementById('steps');
      const items = new Map(); // label -> <li>

      function setStep({ label, state }) {
        let li = items.get(label);
        if (!li) {
          li = document.createElement('li');
          li.innerHTML = '<span class="ico"></span><span class="txt"></span>';
          li.querySelector('.txt').textContent = label;
          list.appendChild(li);
          items.set(label, li);
        }
        li.className = state;
        const ico = li.querySelector('.ico');
        ico.innerHTML =
          state === 'done' ? '✓' : state === 'error' ? '✕' : '<span class="spinner"></span>';
      }

      if (window.peLoading) window.peLoading.onStatus(setStep);
    </script>
  </body>
</html>
