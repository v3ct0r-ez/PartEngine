<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; font-family: Segoe UI, system-ui, sans-serif; }
      body {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: #e2e8f0; user-select: none; padding: 36px 28px;
        background:
          radial-gradient(720px 420px at 50% -8%, rgba(139, 92, 246, 0.28), transparent 70%),
          radial-gradient(640px 420px at 50% 115%, rgba(59, 130, 246, 0.16), transparent 70%),
          #0b1020;
      }
      .brand-img {
        height: 132px; width: auto; max-width: 85%; object-fit: contain;
        filter: drop-shadow(0 8px 28px rgba(139, 92, 246, 0.45));
        animation: rise 0.5s ease both;
      }
      .logo { font-size: 1.7rem; font-weight: 700; letter-spacing: 0.5px; margin-top: 10px; animation: rise 0.5s ease 0.05s both; }
      .sub { color: #94a3b8; font-size: 0.85rem; margin-top: 8px; margin-bottom: 26px; text-align: center; animation: rise 0.5s ease 0.1s both; }
      @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
      .card {
        width: 100%; max-width: 470px; padding: 8px;
        background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(148, 163, 184, 0.16);
        border-radius: 14px; backdrop-filter: blur(4px);
      }
      ul#steps { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 2px; }
      ul#steps li {
        display: flex; align-items: flex-start; gap: 10px; padding: 8px 12px;
        font-size: 0.92rem; line-height: 1.3; color: #64748b; border-radius: 9px;
        transition: color 0.2s ease, background-color 0.2s ease;
      }
      li.active { color: #e2e8f0; background: rgba(139, 92, 246, 0.14); }
      li.done { color: #34d399; }
      li.error { color: #f87171; background: rgba(248, 113, 113, 0.12); }
      .ico { width: 18px; height: 18px; flex: 0 0 18px; margin-top: 1px; display: inline-flex; align-items: center; justify-content: center; font-size: 0.95rem; }
      .txt { flex: 1; word-break: break-word; }
      .spinner { width: 14px; height: 14px; border: 2px solid rgba(148, 163, 184, 0.35); border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .footer { color: #475569; font-size: 0.74rem; margin-top: 26px; text-align: center; }
    </style>
  </head>
  <body>
    <img class="brand-img" src="logo-splash.png" alt="PartEngine" />
    <div class="logo">PartEngine</div>
    <div class="sub">Avvio in corso… il primo avvio può richiedere qualche minuto.</div>
    <div class="card"><ul id="steps"></ul></div>
    <div class="footer">Non chiudere la finestra.</div>

    <script>
      const list = document.getElementById('steps');
      const items = new Map(); // label -> <li>

      function setStep({ label, state }) {
        let li = items.get(label);
        if (!li) {
          li = document.createElement('li');
          li.innerHTML = '<span class="ico"></span><span class="txt"></span>';
          li.querySelector('.txt').textContent = label;
          list.appendChild(li);
          items.set(label, li);
        }
        li.className = state;
        const ico = li.querySelector('.ico');
        ico.innerHTML =
          state === 'done' ? '✓' : state === 'error' ? '✕' : '<span class="spinner"></span>';
      }

      if (window.peLoading) window.peLoading.onStatus(setStep);
    </script>
  </body>
</html>
