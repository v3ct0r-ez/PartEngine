# PartEngine — local development stack.
# Brings up Postgres (with pg_trgm), MinIO (S3) and Redis (jobs + rate-limit).
services:
  db:
    image: postgres:16-alpine
    container_name: partengine-db
    environment:
      POSTGRES_USER: partengine
      POSTGRES_PASSWORD: partengine
      POSTGRES_DB: partengine
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U partengine"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: partengine-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Creates the bucket on startup.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/partengine &&
      mc anonymous set download local/partengine || true
      "

  redis:
    image: redis:7-alpine
    container_name: partengine-redis
    ports:
      - "6379:6379"

volumes:
  db-data:
  minio-data:
