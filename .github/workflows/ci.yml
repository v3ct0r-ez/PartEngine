name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:

# Opt JavaScript actions into Node 24 (Node 20 is deprecated on GitHub runners).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: partengine
          POSTGRES_PASSWORD: partengine
          POSTGRES_DB: partengine
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U partengine"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql://partengine:partengine@localhost:5432/partengine?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @partengine/core test -- --coverage # enforces ≥80% (vitest.config thresholds)
      - run: pnpm --filter @partengine/core lint
      - run: pnpm --filter @partengine/api prisma:generate
      - run: pnpm -r build

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: partengine
          POSTGRES_PASSWORD: partengine
          POSTGRES_DB: partengine
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U partengine"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql://partengine:partengine@localhost:5432/partengine?schema=public
      # API on 47600 so the web app's default /api proxy target works unchanged.
      API_PORT: '47600'
      HOST: 127.0.0.1
      JWT_ACCESS_SECRET: e2e-access-secret
      E2E_BASE_URL: http://localhost:3000
      E2E_NO_SERVER: '1' # the workflow starts the stack itself; Playwright just drives it
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @partengine/api prisma:generate
      - run: pnpm --filter @partengine/api prisma:migrate # migrate deploy
      - run: pnpm -r build
      - run: pnpm --filter @partengine/web exec playwright install --with-deps chromium
      - name: Start API + web
        run: |
          node apps/api/dist/main.js & echo $! > /tmp/api.pid
          npx --yes wait-on -t 60000 http://127.0.0.1:47600/api/auth/status
          pnpm --filter @partengine/web start & echo $! > /tmp/web.pid
          npx --yes wait-on -t 60000 http://localhost:3000
      - run: pnpm --filter @partengine/web test:e2e
      - name: Stop services
        if: always()
        run: kill "$(cat /tmp/api.pid)" "$(cat /tmp/web.pid)" 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
